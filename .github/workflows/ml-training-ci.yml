name: ML Training CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build: # STAGE 1: Compilation - halts on any error
    name: 1. Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore /warnaserror

  test: # STAGE 2: Unit Testing
    name: 2. Unit Tests
    needs: build # will not run if build fails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - run: dotnet test --configuration Release --no-build --verbosity normal

  validate: # STAGE 3: Validation Gate + Artifacts
    name: 3. Validate & Publish
    needs: test # will not run if tests fail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      
      - name: Run full training
        run: dotnet run --project src/MlApp --configuration Release

      - name: Validation Gate - Fail if MSE > 1.0
        run: |
          TEST_MSE=$(grep '^test_mse=' metrics.txt | cut -d'=' -f2)
          echo "Test MSE = $TEST_MSE"
          python3 -c "import sys; sys.exit(0 if float(sys.argv[1]) < 1.0 else 1)" $TEST_MSE

      - name: Publish Versioned Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ github.run_number }}-${{ github.sha }}
          path: |
            model_output.txt
            metrics.txt
          retention-days: 30